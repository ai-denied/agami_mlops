name: Build & Push flashlight-api

on:
  push:
    branches: [main]
    paths:
      - "ml-pipeline/**"
      - "manifests/**"
      - ".github/workflows/build-flashlight-api.yml"

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag"
        required: false
        default: "latest"

env:
  REGISTRY: agami-captcha.cloud:8443
  IMAGE_NAME: agami/flashlight-api

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA::8}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./ml-pipeline
          file: ./ml-pipeline/Dockerfile.api
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed image
        run: |
          echo "Pushed image:"
          echo "${{ steps.tag.outputs.full_image }}"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  deploy:
    name: Rolling Restart on K8s
    needs: build-and-push
    runs-on: ubuntu-latest
    # main 브랜치 push 시에만 실제 배포 (workflow_dispatch는 빌드만)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Rolling restart
        run: |
          kubectl rollout restart deployment/flashlight-inference-api -n argo
          kubectl rollout status  deployment/flashlight-inference-api -n argo --timeout=120s

      - name: Verify health
        run: |
          POD=$(kubectl get pod -n argo -l app=flashlight-inference-api \
                  -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n argo "$POD" -- \
            curl -sf http://localhost:8080/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('status:', d['status'], '/ model_version:', d['model_version'])
          sys.exit(0 if d['model_loaded'] else 1)
          "