name: Build and Push Flashlight Image

on:
  push:
    branches:
      - main
    paths:
      - 'ml-pipeline/Dockerfile.flashlight'
      - 'ml-pipeline/flashlight/**'
      - 'ml-pipeline/requirements-flashlight.txt'
      - '.github/workflows/build-flashlight.yml'
  workflow_dispatch:

env:
  IMAGE_NAME: agami-mlops-flashlight
  DOCKERFILE_PATH: ml-pipeline/Dockerfile.flashlight

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "image_tag=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "image_latest=latest" >> $GITHUB_OUTPUT

      - name: Login to Harbor Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ml-pipeline
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ secrets.HARBOR_URL }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
            ${{ secrets.HARBOR_URL }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_latest }}
          cache-from: type=registry,ref=${{ secrets.HARBOR_URL }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.HARBOR_URL }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image build summary
        run: |
          echo "✅ Docker image built and pushed successfully"
          echo "Registry: ${{ secrets.HARBOR_URL }}"
          echo "Image: ${{ env.IMAGE_NAME }}"
          echo "Tags:"
          echo "  - ${{ steps.tag.outputs.image_tag }}"
          echo "  - ${{ steps.tag.outputs.image_latest }}"
