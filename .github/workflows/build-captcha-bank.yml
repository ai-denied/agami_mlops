name: Build & Push captcha-bank

on:
  push:
    branches: [main]
    paths:
      - "ml-pipeline/context_emotion/**"
      - "ml-pipeline/Dockerfile.captcha-bank"
      - "ml-pipeline/requirements-captcha-bank.txt"
      - ".github/workflows/build-captcha-bank.yml"

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (default: latest)"
        required: false
        default: "latest"

env:
  REGISTRY: agami-captcha.cloud:8443
  IMAGE_NAME: agami/agami-captcha-bank

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            TAG="${GITHUB_SHA::8}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./ml-pipeline
          file: ./ml-pipeline/Dockerfile.captcha-bank
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pushed image
        run: |
          echo "Pushed image:"
          echo "${{ steps.tag.outputs.full_image }}"
          echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
