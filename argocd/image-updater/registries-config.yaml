# =============================================================================
# ArgoCD Image Updater — Harbor 레지스트리 설정
#
# 적용:
#   kubectl apply -f argocd/image-updater/registries-config.yaml -n argocd
#
# 적용 후 Image Updater Pod 재시작:
#   kubectl rollout restart deployment argocd-image-updater -n argocd
#
# 주의: argocd-image-updater-config ConfigMap 이 이미 존재하면
#        kubectl patch 또는 edit 으로 registries.conf 항목만 추가한다.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  # 폴링 주기 (기본 2분)
  interval: 2m0s

  # 로그 레벨: debug / info / warn / error
  log.level: info

  registries.conf: |
    registries:
    - name: "Harbor (agami)"
      prefix: agami-captcha.cloud:8443
      api_url: https://agami-captcha.cloud:8443
      insecure: false
      # harbor-regcred 시크릿에서 인증 정보를 읽는다.
      # 시크릿 형식: kubernetes.io/dockerconfigjson (imagePullSecret 표준)
      credentials: pullsecret:agami/harbor-regcred
      defaultns: agami
      default: false
