# feedback_quality_policy.yaml
#
# score_problem_quality.py 가 사용하는 임계값.
# 수정 후 파이프라인 재실행 시 자동 반영된다 (재배포 불필요).

thresholds:
  # ── 데이터 충분성 ──────────────────────────────────────────────────────
  # 이 기준 미만이면 insufficient_data → 판정 보류, ACTIVE 유지
  min_attempts_per_problem: 30

  # ── 사람 정답률 ────────────────────────────────────────────────────────
  # 이 미만이면 너무 어렵거나 모호 → ambiguous / REVIEW
  min_human_pass_rate: 0.55

  # 이 초과이면 너무 쉬움 → ambiguous / REVIEW
  max_human_pass_rate: 0.92

  # ── 공격 노출 ──────────────────────────────────────────────────────────
  # suspicious (solve_time < 800ms) 비율이 이 초과이면 → attack_exposed / RETIRED
  max_suspicious_rate: 0.15

  # ── UX 품질 ────────────────────────────────────────────────────────────
  # 평균 풀이 시간이 이 초과이면 → ux_poor / REVIEW
  max_avg_solve_time_ms: 45000   # 45초

  # ── 혼란도 ─────────────────────────────────────────────────────────────
  # 재시도율이 이 초과이면 → confusing / REVIEW
  max_retry_rate: 0.40

  # ── Robust 기준 ────────────────────────────────────────────────────────
  # 사람 정답률이 이상이고 suspicious 비율이 이하이면 → robust / ACTIVE
  min_robust_pass_rate: 0.65
  max_robust_suspicious_rate: 0.08

# status → pool_status 매핑 (참조용 주석, 코드에서 직접 사용하지 않음)
#
#   robust            → ACTIVE
#   normal            → ACTIVE
#   insufficient_data → ACTIVE
#   ambiguous         → REVIEW
#   ux_poor           → REVIEW
#   confusing         → REVIEW
#   attack_exposed    → RETIRED  (보안 문제 — 풀에서 즉시 제거)
