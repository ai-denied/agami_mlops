# feedback_trigger_policy.yaml
#
# trigger_policy.py 가 사용하는 트리거 조건.
# 모든 활성 게이트가 통과해야 feedback 파이프라인이 실행된다.

trigger:
  # ── Gate 1: 신규 attempt 건수 ─────────────────────────────────────────
  # 마지막 승격(promoted_at) 이후 누적된 attempt 총 건수
  min_new_attempts: 1000

  # ── Gate 2: 문제별 평균 attempt ───────────────────────────────────────
  # new_attempts / pool_size 로 계산
  # 30건 미만이면 통계적으로 불안정 → 트리거 보류
  min_avg_attempts_per_problem: 30

  # ── Gate 3: 마지막 승격 이후 경과일 ──────────────────────────────────
  # 너무 자주 파이프라인이 돌지 않도록 최소 간격 제한
  min_days_since_last_promote: 7

  # ── Gate 4: bad problem 비율 (선택) ───────────────────────────────────
  # quality_scores.csv 가 있을 때만 평가
  # REVIEW + RETIRED 비율이 이 이상이면 트리거 가속
  min_bad_problem_ratio: 0.10

  # false 이면 quality_scores.csv 없이도 Gate 4를 무시하고 진행 가능
  # true  이면 quality_scores.csv 없으면 Gate 4 실패 → 트리거 보류
  require_quality_check: false
