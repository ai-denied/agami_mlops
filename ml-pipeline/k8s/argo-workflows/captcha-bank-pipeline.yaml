# =============================================================================
# captcha_bank MLOps 파이프라인 — Argo Workflows
#
# 8단계 DAG 파이프라인:
#
#   validate-captcha-pool ─┬─→ train-model → evaluate-model ──┐
#                           └─→ build-choice-policy-report ────→ package-model
#                                                                     → compare-model
#                                                                       → promote-model
#                                                                         → smoke-test
#
# 포함 리소스:
#   1. WorkflowTemplate  — 재사용 가능한 파이프라인 정의
#   2. CronWorkflow      — 정기 자동 실행 (매주 화요일 03:00 KST)
#
# 사전 조건:
#   kubectl apply -f pvc-captcha-bank.yaml        -n agami
#   kubectl apply -f rbac-captcha-bank-workflow.yaml -n agami
#
# 적용 방법:
#   kubectl apply -f captcha-bank-pipeline.yaml -n agami
#
# 수동 실행:
#   argo submit --from workflowtemplate/captcha-bank-pipeline \
#     -p version=v1_20260701 \
#     -p pool_csv=/data/context_emotion/captcha_bank/captcha_pool.csv \
#     -n agami
#
# ── 단계 간 파일 전달 방법 ─────────────────────────────────────────────────────
#   각 DAG task는 별도 Pod에서 실행되므로 emptyDir는 공유되지 않는다.
#   중간 산출물(model.joblib, evaluation_result.json 등)은
#   captcha-bank-model-store-pvc 상의 .workdir/{version}/ 디렉토리에 저장한다.
#   captcha-bank-model-store-pvc는 ReadWriteMany여야 병렬 step 간 동시 접근이 가능하다.
# =============================================================================

---
# -----------------------------------------------------------------------------
# [1] WorkflowTemplate — 8단계 DAG 파이프라인
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: captcha-bank-pipeline
  namespace: agami
  labels:
    app: captcha-bank
    component: mlops-pipeline
  annotations:
    description: "validate → train → eval+choice-report(parallel) → package → compare → promote → smoke-test"
    version: "v2"
spec:
  serviceAccountName: captcha-bank-workflow-sa

  ttlStrategy:
    secondsAfterCompletion: 86400   # 완료(성공/실패 모두) 24시간 후 워크플로우 객체 삭제
    secondsAfterSuccess: 86400
    secondsAfterFailure: 259200     # 실패는 3일 유지 (디버깅 여유)

  podGC:
    strategy: OnWorkflowCompletion  # 워크플로우 종료 시 pod 즉시 정리

  arguments:
    parameters:
    - name: version
      value: ""            # 필수: v1_20260701 형식

    - name: pool_csv
      # captcha-bank-data-pvc가 /data 에 마운트되고,
      # export_captcha_pool.py 출력 경로와 일치해야 한다.
      value: "/data/context_emotion/captcha_bank/captcha_pool.csv"

    - name: min_rows
      value: "200"

    - name: dry_run
      value: "false"       # "true"이면 promote 단계를 --dry-run으로만 실행

    - name: force_promote
      value: "false"       # "true"이면 compare 게이트 실패 시에도 승격 진행

  entrypoint: pipeline-dag
  onExit: exit-handler

  # ── 볼륨 ─────────────────────────────────────────────────────────────────────
  # model-store PVC: ReadWriteMany 필수 (병렬 step 간 동시 접근)
  # 마운트 경로: /workspace/ml-pipeline/model-store
  #   → 스크립트의 _ML_PIPELINE_ROOT / "model-store" / "captcha_bank" 경로와 일치
  # .workdir/{version}/ 하위에 step 간 중간 파일을 저장한다.
  volumes:
  - name: model-store
    persistentVolumeClaim:
      claimName: captcha-bank-model-store-pvc   # ReadWriteMany
  - name: data
    persistentVolumeClaim:
      claimName: captcha-bank-data-pvc          # ReadOnlyMany

  templates:

  # ---------------------------------------------------------------------------
  # 메인 DAG
  # ---------------------------------------------------------------------------
  - name: pipeline-dag
    inputs:
      parameters:
      - name: version
      - name: pool_csv
      - name: min_rows
      - name: dry_run
      - name: force_promote
    dag:
      tasks:

      # ── STEP 1: 풀 검증 ───────────────────────────────────────────────────
      - name: validate-captcha-pool
        template: run-step
        arguments:
          parameters:
          - name: step_name
            value: "STEP 1/8  풀 검증"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: >-
              python -m context_emotion.captcha_bank.scripts.validate_captcha_pool
              --pool-csv "{{inputs.parameters.pool_csv}}"
              --min-rows {{inputs.parameters.min_rows}}

      # ── STEP 2: 모델 학습 ─────────────────────────────────────────────────
      - name: train-model
        template: run-step
        dependencies: [validate-captcha-pool]
        arguments:
          parameters:
          - name: step_name
            value: "STEP 2/8  모델 학습"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: >-
              python -m context_emotion.captcha_bank.training.train_attack_model
              --pool-csv "{{inputs.parameters.pool_csv}}"
              --output   "${WORKDIR}/model.joblib"
              --version  "{{inputs.parameters.version}}"

      # ── STEP 3: 보안 평가 (STEP 2 완료 후) ──────────────────────────────
      - name: evaluate-model
        template: run-step
        dependencies: [train-model]
        arguments:
          parameters:
          - name: step_name
            value: "STEP 3/8  보안 평가"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: >-
              python -m context_emotion.captcha_bank.evaluation.run_attack_eval
              --pool-csv "{{inputs.parameters.pool_csv}}"
              --model    "${WORKDIR}/model.joblib"
              --output   "${WORKDIR}/evaluation_result.json"
              --version  "{{inputs.parameters.version}}"

      # ── STEP 4: 선택지 정책 리포트 (STEP 1 완료 후, STEP 2와 병렬) ──────
      # pool CSV만 필요하므로 train-model과 독립적으로 실행 가능.
      - name: build-choice-policy-report
        template: run-step
        dependencies: [validate-captcha-pool]
        arguments:
          parameters:
          - name: step_name
            value: "STEP 4/8  선택지 정책 리포트"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: |
              python -m context_emotion.captcha_bank.build_choice_policy_report \
                --input-csv  "{{inputs.parameters.pool_csv}}" \
                --output-csv "${WORKDIR}/captcha_pool_with_choices.csv" \
                --output-md  "${WORKDIR}/choice_policy_report.md" \
              || echo "[WARNING] 선택지 정책 리포트 생성 실패 — 패키징에서 제외"

      # ── STEP 5: 패키징 (STEP 3 + STEP 4 완료 후) ────────────────────────
      - name: package-model
        template: run-step
        dependencies: [evaluate-model, build-choice-policy-report]
        arguments:
          parameters:
          - name: step_name
            value: "STEP 5/8  패키징"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: |
              MD_ARG=""
              [ -f "${WORKDIR}/choice_policy_report.md" ] && MD_ARG="--policy-md ${WORKDIR}/choice_policy_report.md"
              python -m context_emotion.captcha_bank.scripts.package_model \
                --version      "{{inputs.parameters.version}}" \
                --model-joblib "${WORKDIR}/model.joblib" \
                --eval-json    "${WORKDIR}/evaluation_result.json" \
                --pool-csv     "{{inputs.parameters.pool_csv}}" \
                ${MD_ARG}

      # ── STEP 6: 후보 비교 ─────────────────────────────────────────────────
      - name: compare-model
        template: run-step
        dependencies: [package-model]
        arguments:
          parameters:
          - name: step_name
            value: "STEP 6/8  후보 비교"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: |
              if [ "{{inputs.parameters.force_promote}}" = "true" ]; then
                echo "[FORCE-PROMOTE] 비교 게이트 건너뜀"
                exit 0
              fi
              python -m context_emotion.captcha_bank.scripts.compare_candidate \
                --version "{{inputs.parameters.version}}"

      # ── STEP 7: 승격 ─────────────────────────────────────────────────────
      - name: promote-model
        template: run-step
        dependencies: [compare-model]
        arguments:
          parameters:
          - name: step_name
            value: "STEP 7/8  승격"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: |
              DRY=""
              [ "{{inputs.parameters.dry_run}}" = "true" ] && DRY="--dry-run"
              python -m context_emotion.captcha_bank.scripts.promote_model \
                --version "{{inputs.parameters.version}}" ${DRY}

      # ── STEP 8: 스모크 테스트 ─────────────────────────────────────────────
      - name: smoke-test
        template: run-step
        dependencies: [promote-model]
        arguments:
          parameters:
          - name: step_name
            value: "STEP 8/8  스모크 테스트"
          - name: version
            value: "{{inputs.parameters.version}}"
          - name: command
            value: >-
              python -m context_emotion.captcha_bank.scripts.smoke_test

  # ---------------------------------------------------------------------------
  # 공통 step 템플릿
  #
  # WORKDIR 환경변수:
  #   model-store PVC 내 임시 작업 디렉토리.
  #   모든 step이 같은 PVC를 마운트하므로 step 간 파일을 공유할 수 있다.
  #   경로: /workspace/ml-pipeline/model-store/.workdir/{version}/
  # ---------------------------------------------------------------------------
  - name: run-step
    inputs:
      parameters:
      - name: step_name
      - name: version
      - name: command
    container:
      image: agami-captcha.cloud:8443/agami/agami-captcha-bank:latest
      imagePullPolicy: Always
      command: [bash, -euo, pipefail, -c]
      args:
      - |
        echo "══════════════════════════════════════════════════════════════"
        echo "  {{inputs.parameters.step_name}}"
        echo "══════════════════════════════════════════════════════════════"
        export WORKDIR="/workspace/ml-pipeline/model-store/.workdir/{{inputs.parameters.version}}"
        mkdir -p "${WORKDIR}"
        cd /workspace/ml-pipeline
        {{inputs.parameters.command}}
      env:
      - name: PYTHONPATH
        value: "/workspace/ml-pipeline"
      - name: PYTHONDONTWRITEBYTECODE
        value: "1"
      - name: PYTHONUNBUFFERED
        value: "1"
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      volumeMounts:
      - name: model-store
        mountPath: /workspace/ml-pipeline/model-store
      - name: data
        mountPath: /data
        readOnly: true

  # ---------------------------------------------------------------------------
  # 종료 핸들러: 성공/실패 요약 + .workdir 정리
  # ---------------------------------------------------------------------------
  - name: exit-handler
    steps:
    - - name: cleanup
        template: cleanup-workdir
        arguments:
          parameters:
          - name: version
            value: "{{workflow.parameters.version}}"

  - name: cleanup-workdir
    inputs:
      parameters:
      - name: version
    container:
      image: agami-captcha.cloud:8443/agami/agami-captcha-bank:latest
      command: [bash, -c]
      args:
      - |
        echo "══════════════════════════════════════════════════════════════"
        echo "  captcha_bank 파이프라인 종료  status={{workflow.status}}"
        echo "══════════════════════════════════════════════════════════════"
        WORKDIR="/workspace/ml-pipeline/model-store/.workdir/{{inputs.parameters.version}}"
        if [ -d "${WORKDIR}" ]; then
          rm -rf "${WORKDIR}"
          echo "  .workdir 정리 완료: ${WORKDIR}"
        fi
      volumeMounts:
      - name: model-store
        mountPath: /workspace/ml-pipeline/model-store

---
# -----------------------------------------------------------------------------
# [2] CronWorkflow — 매주 화요일 03:00 KST (월요일 18:00 UTC)
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: captcha-bank-pipeline-cron
  namespace: agami
  labels:
    app: captcha-bank
    component: mlops-cron
spec:
  schedules:
  - "0 18 * * 1"            # 매주 월요일 18:00 UTC = 화요일 03:00 KST
  timezone: "UTC"
  concurrencyPolicy: Replace
  startingDeadlineSeconds: 300
  workflowSpec:
    workflowTemplateRef:
      name: captcha-bank-pipeline
    arguments:
      parameters:
      - name: version
        value: ""           # 빈 문자열 → 수동 실행 시 반드시 지정할 것
      - name: pool_csv
        value: "/data/context_emotion/processed/captcha_bank_weighted_2122.csv"
      - name: min_rows
        value: "200"
      - name: dry_run
        value: "false"
      - name: force_promote
        value: "false"
