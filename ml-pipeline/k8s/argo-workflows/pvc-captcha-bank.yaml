# =============================================================================
# pvc-captcha-bank.yaml
#
# captcha_bank Argo Workflow에서 사용하는 볼륨 정의
#
# 포함 PVC:
#   1. captcha-bank-model-store-pvc  — model-store + step 간 workdir 공유용
#   2. captcha-bank-data-pvc         — CAPTCHA 풀 CSV + 이미지 데이터
#
# 주의: local-path provisioner는 ReadWriteOnce만 지원한다.
#   Argo Workflow 병렬 step(STEP 2 + STEP 4)이 동일 노드에서 실행되는 경우
#   RWO PVC를 동시에 마운트할 수 있다. 다른 노드에서 병렬 실행이 필요하면
#   NFS/Longhorn/Ceph 등 RWX 지원 CSI로 교체 필요.
#
# 적용:
#   kubectl apply -f pvc-captcha-bank.yaml -n agami
# =============================================================================

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: captcha-bank-model-store-pvc
  namespace: agami
  labels:
    app: captcha-bank
    component: model-store
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: "local-path"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: captcha-bank-data-pvc
  namespace: agami
  labels:
    app: captcha-bank
    component: data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: "local-path"
