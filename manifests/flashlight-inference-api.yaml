#
# 이 파일은 더 이상 적용 대상이 아니다. 운영 정본은
# manifests/flashlight-inference-api/deployment.yaml (namespace: agami).
#
# 배경 (2026-06-24 클러스터 확인):
#   - argo namespace의 flashlight-inference-api Deployment: 0/2 Available
#     (replicas=2였지만 가동되지 않음 — 이 파일이 정의하던 리소스)
#   - agami namespace의 flashlight-inference-api Deployment: 1/1 Available
#     (실제로 트래픽을 서빙 중인 운영 Deployment)
#
# 2026-06-15 커밋(b590febc "fix: unify namespace to agami")에서 namespace를
# agami로 옮기는 작업이 있었지만, CI(.github/workflows/build-flashlight-api.yml)의
# MANIFEST_FILE이 이 파일(argo)을 계속 가리키고 있어 agami 쪽 매니페스트는 이후
# 한 번도 이미지가 갱신되지 않았다. CI는 이제 manifests/flashlight-inference-api/
# deployment.yaml을 가리키도록 수정됐다.
#
# 이 파일 자체는 Deployment/Service 리소스를 더 이상 포함하지 않는다 - 누군가
# 실수로 `kubectl apply -f`를 실행해도 아무 것도 생성/변경되지 않는다.
#
# 정리 절차(클러스터 접근 가능한 사람이 수행):
#   1. argo namespace에 남아있는 0/2 Deployment/Service가 실제로 미사용인지
#      재확인 (트래픽/Ingress/다른 Service가 이 namespace를 참조하지 않는지)
#   2. 확인되면 삭제:
#        kubectl delete deployment flashlight-inference-api -n argo
#        kubectl delete service    flashlight-inference-api-svc -n argo
#   3. 삭제 후 이 파일도 git에서 제거 (rm manifests/flashlight-inference-api.yaml)
#
# 과거 버전은 git log -p -- manifests/flashlight-inference-api.yaml 로 확인 가능.
