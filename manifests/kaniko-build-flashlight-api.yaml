# =============================================================================
# kaniko-build-flashlight-api.yaml
#
# Docker 데몬 없이 K8s 클러스터 내에서 이미지를 빌드·push한다.
# GitHub Actions / GPU 서버 접근이 불가할 때 사용한다.
#
# 사전 조건:
#   1. Harbor 인증 Secret 생성
#      kubectl create secret docker-registry harbor-registry-secret \
#        --docker-server=agami-captcha.cloud:8443 \
#        --docker-username=<USER> \
#        --docker-password=<PASS> \
#        -n default
#
#   2. 소스 코드가 PVC 또는 ConfigMap으로 마운트되어 있어야 한다.
#      → 아래 예시는 git clone을 initContainer로 수행하는 방식
#
# 실행:
#   kubectl apply -f manifests/kaniko-build-flashlight-api.yaml
#   kubectl logs -f job/kaniko-build-flashlight-api
#
# 완료 확인:
#   kubectl get job kaniko-build-flashlight-api
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-build-flashlight-api
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600  # 1시간 후 자동 삭제
  template:
    spec:
      restartPolicy: Never

      # ── 소스 코드 준비 (git clone) ──────────────────────────────────────────
      initContainers:
        - name: git-clone
          image: alpine/git:latest
          command:
            - sh
            - -c
            - |
              git clone https://github.com/ai-denied/agami_mlops.git /workspace
              echo "Clone 완료"
          volumeMounts:
            - name: workspace
              mountPath: /workspace

      # ── Kaniko 빌드 ─────────────────────────────────────────────────────────
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - --dockerfile=/workspace/ml-pipeline/Dockerfile.api
            - --context=/workspace
            - --destination=agami-captcha.cloud:8443/agami/flashlight-api:latest
            # Harbor가 HTTP(비TLS)인 경우 아래 주석 해제
            # - --insecure
            # 레이어 캐시 활용 (Harbor에 캐시 repo 필요)
            # - --cache=true
            # - --cache-repo=agami-captcha.cloud:8443/agami/flashlight-api-cache
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: kaniko-secret
              mountPath: /kaniko/.docker
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

      volumes:
        - name: workspace
          emptyDir: {}
        - name: kaniko-secret
          projected:
            sources:
              - secret:
                  name: harbor-registry-secret
                  items:
                    - key: .dockerconfigjson
                      path: config.json
