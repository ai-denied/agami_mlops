# =============================================================================
# flashlight-inference-api.yaml
#
# flashlight CAPTCHA 추론 API 서버 Kubernetes 배포 매니페스트
#
# 포함 리소스:
#   1. Deployment  — flashlight-inference-api
#   2. Service     — flashlight-inference-api-svc (ClusterIP)
#
# 의존:
#   - flashlight-model-store-pvc (pvc-flashlight.yaml 에 정의)
#     → API 서버와 같은 namespace에 있어야 한다
#
# 이미지 빌드:
#   docker build -f ml-pipeline/Dockerfile.api \
#                -t agami-captcha.cloud:8443/agami/flashlight-api:latest .
#   docker push agami-captcha.cloud:8443/agami/flashlight-api:latest
#
# 적용:
#   kubectl apply -f manifests/flashlight-inference-api.yaml -n agami
#
# 엔드포인트 확인:
#   kubectl port-forward svc/flashlight-inference-api-svc 8080:80 -n agami
#   curl http://localhost:8080/health
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flashlight-inference-api
  namespace: agami
  labels:
    app: flashlight-inference-api
    component: inference
spec:
  # ── 복제본 ────────────────────────────────────────────────────────────────
  # ReadWriteOnce PVC를 여러 Pod이 공유하려면 동일 노드에 스케줄링되어야 한다.
  # 멀티 노드 환경에서 scale-out이 필요한 경우 PVC를 ReadOnlyMany로 변경하거나
  # 이미지에 model-store를 번들링하는 방식으로 전환한다.
  replicas: 1

  selector:
    matchLabels:
      app: flashlight-inference-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # 무중단 배포: 신규 Pod 준비 완료 후 구 Pod 종료

  template:
    metadata:
      labels:
        app: flashlight-inference-api
        component: inference

    spec:
      # ── 보안 컨텍스트 ───────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      # ── 컨테이너 ────────────────────────────────────────────────────────────
      containers:
        - name: flashlight-api
          image: agami-captcha.cloud:8443/agami/flashlight-api:9c2a6197
          imagePullPolicy: Always

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          # ── 환경 변수 ─────────────────────────────────────────────────────
          env:
            - name: FLASHLIGHT_MODEL_DIR
              value: /workspace/ml-pipeline/model-store/flashlight/current
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: DASHBOARD_CACHE_PATH
              value: /workspace/ml-pipeline/model-store/flashlight/dashboard_cache.json

          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "640Mi"

          # ── Readiness Probe ────────────────────────────────────────────────
          # 모델 로드 완료 후에만 트래픽 수신 (startup 지연 고려)
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ── Liveness Probe ─────────────────────────────────────────────────
          # 응답 불가 상태 감지 후 Pod 재시작
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          # ── 볼륨 마운트 ───────────────────────────────────────────────────
          volumeMounts:
            - name: model-store
              mountPath: /workspace/ml-pipeline/model-store
              readOnly: true

      # ── 볼륨 정의 ────────────────────────────────────────────────────────
      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: flashlight-model-store-pvc
            readOnly: true

      # ── 이미지 풀 시크릿 (프라이빗 레지스트리) ─────────────────────────────
      # ── 노드 선호도 (GPU 노드 제외) ────────────────────────────────────────
      # affinity:
      #   nodeAffinity:
      #     preferredDuringSchedulingIgnoredDuringExecution:
      #       - weight: 1
      #         preference:
      #           matchExpressions:
      #             - key: kubernetes.io/arch
      #               operator: In
      #               values: ["amd64"]

---
apiVersion: v1
kind: Service
metadata:
  name: flashlight-inference-api-svc
  namespace: agami
  labels:
    app: flashlight-inference-api
    component: inference
spec:
  type: ClusterIP
  selector:
    app: flashlight-inference-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

  # 외부 노출이 필요한 경우:
  # type: LoadBalancer
  # 또는 Ingress 리소스를 별도로 정의한다.

