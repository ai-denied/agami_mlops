# =============================================================================
# flashlight model-store 업데이트 파이프라인 — Argo Workflows 2차 구현
#
# 구조: update-model(package→compare→promote, 단일 컨테이너)
#       → restart-inference-api(kubectl rollout restart + status 대기)
#       → smoke-test-api(/health 버전 일치 + /predict 정상 동작 확인)
#       → precompute-dashboard(dashboard_cache.json 재생성)
#
# compare 단계는 ONNX runtime contract 검증(flashlight/config/runtime_contract.yaml,
# evaluation/onnx_contract_check.py)을 성능 비교보다 먼저 통과해야 한다 - 텐서
# 이름/shape/dtype이 바뀐 모델은 성능이 좋아도 승격되지 않는다
# (scripts/compare_candidate.py, scripts/promote_model.py 참고).
#
# 포함 리소스:
#   1. WorkflowTemplate  — 재사용 가능한 파이프라인 정의
#   2. CronWorkflow      — 정기 자동 실행 (매주 월요일 03:00 KST)
#
# 적용 방법:
#   kubectl apply -f flashlight-model-update-workflow.yaml
#
# 수동 실행:
#   argo submit --from workflowtemplate/flashlight-model-update \
#     -p version=v4_20260610 \
#     -p dry_run=true
#
# 2026-06-24 클러스터 확인: agami namespace의 flashlight-inference-api가
# 1/1 Available로 실제 서빙 중인 운영 Deployment (argo namespace 쪽은 0/2,
# 가동 안 됨 - deprecated, manifests/flashlight-inference-api.yaml 참고).
# inference_namespace 기본값 "agami"는 확정값이다.
#
# 미구현 항목:
#   - 캡챠 엔진 서버 연동 (captcha-engine reload API 호출)
#   - PVC 실제 이름 확정
#   - 컨테이너 이미지 레지스트리 경로 확정
#   - flashlight-workflow-sa가 inference_namespace의 Deployment를 patch할 수
#     있어야 한다 (rbac-flashlight-workflow.yaml의 [4] RoleBinding 참고)
# =============================================================================

---
# -----------------------------------------------------------------------------
# [1] WorkflowTemplate — 재사용 가능한 단일 step 파이프라인
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: flashlight-model-update
  namespace: argo
  labels:
    app: flashlight
    component: model-update-pipeline
  annotations:
    description: "package → compare → promote 파이프라인 (1차: 단일 step)"
    version: "v1"
spec:
  # rbac-flashlight-workflow.yaml에서 생성한 ServiceAccount
  # 미지정 시 namespace의 default SA가 사용되며 권한 부족으로 실패할 수 있다.
  serviceAccountName: flashlight-workflow-sa

  # 성공 시: pod 즉시 삭제 (디버깅 불필요, 리소스 낭비 방지)
  # 실패 시: ttlStrategy가 담당 (아래) — podGC는 트리거되지 않음
  podGC:
    strategy: OnWorkflowSuccess

  # 실패 시 30분간 pod/로그를 보존한 뒤 자동 삭제
  # 성공 시 workflow 오브젝트는 10분 뒤 삭제 (pod는 podGC가 이미 처리)
  ttlStrategy:
    secondsAfterFailure: 1800
    secondsAfterSuccess: 600

  # 워크플로우 수준 파라미터 기본값
  # 실행 시 -p 플래그로 오버라이드 가능
  arguments:
    parameters:
    - name: version
      # 필수. 비워두면 스크립트 내부에서 날짜 기반 자동 생성 (v_YYYYMMDD)
      value: ""

    - name: onnx_path
      # 학습 완료 후 생성된 ONNX 파일 경로 (data PVC 내 상대경로 또는 절대경로)
      value: "runs/mouse_gru_latest/mouse_gru_server_final_v2.onnx"

    - name: normalizer_path
      # 학습 완료 후 생성된 joblib normalizer 경로
      value: "runs/mouse_gru_latest/mouse_normalizer_server_final_v2.joblib"

    - name: metadata_path
      # 학습 완료 후 생성된 metadata JSON 경로
      value: "runs/mouse_gru_latest/mouse_metadata_server_final_v2.json"

    - name: dry_run
      # "true" 이면 promote 단계를 dry-run으로만 실행 (current 미변경)
      value: "false"

    - name: inference_namespace
      # flashlight-inference-api Deployment가 떠 있는 namespace.
      # 2026-06-24 클러스터 확인으로 agami가 운영 namespace임이 확정됨
      # (argo namespace의 동명 Deployment는 0/2로 가동되지 않음 - deprecated).
      value: "agami"

    - name: inference_deployment_name
      value: "flashlight-inference-api"

    - name: inference_base_url
      # smoke test가 호출할 in-cluster 서비스 주소
      value: "http://flashlight-inference-api-svc.agami.svc.cluster.local"

    - name: rollout_timeout
      # kubectl rollout status가 새 pod Ready를 기다리는 최대 시간
      value: "180s"

    - name: smoke_test_retries
      value: "6"

  entrypoint: pipeline-dag

  templates:
  # ---------------------------------------------------------------------------
  # DAG: 모델 업데이트 → 대시보드 캐시 재생성 순서로 실행
  # ---------------------------------------------------------------------------
  - name: pipeline-dag
    dag:
      tasks:
      - name: update-model
        template: run-pipeline
        arguments:
          parameters:
          - name: version
            value: "{{workflow.parameters.version}}"
          - name: onnx_path
            value: "{{workflow.parameters.onnx_path}}"
          - name: normalizer_path
            value: "{{workflow.parameters.normalizer_path}}"
          - name: metadata_path
            value: "{{workflow.parameters.metadata_path}}"
          - name: dry_run
            value: "{{workflow.parameters.dry_run}}"

      # update-model이 promote까지 성공한 뒤에만 실행된다 (Argo 기본 동작: 의존
      # task가 실패하면 dependents는 자동으로 건너뜀). dry_run일 때는 current가
      # 바뀌지 않으므로 운영 pod를 재시작할 필요가 없다.
      - name: restart-inference-api
        template: restart-inference-api
        dependencies: [update-model]
        when: "{{workflow.parameters.dry_run}} != true"
        arguments:
          parameters:
          - name: namespace
            value: "{{workflow.parameters.inference_namespace}}"
          - name: deployment_name
            value: "{{workflow.parameters.inference_deployment_name}}"
          - name: rollout_timeout
            value: "{{workflow.parameters.rollout_timeout}}"

      # rollout status가 새 pod Ready를 확인한 뒤에만 실행 - restart-inference-api가
      # 실패(타임아웃/롤백)하면 smoke test는 건너뛰고 워크플로우가 바로 실패로 끝난다.
      - name: smoke-test-api
        template: smoke-test-api
        dependencies: [restart-inference-api]
        arguments:
          parameters:
          - name: base_url
            value: "{{workflow.parameters.inference_base_url}}"
          - name: expected_version
            value: "{{tasks.update-model.outputs.parameters.resolved-version}}"
          - name: retries
            value: "{{workflow.parameters.smoke_test_retries}}"

      # 모델 업데이트 + 재시작 + 스모크 테스트까지 전부 끝난 뒤에만 캐시 재생성
      # (스모크 테스트가 FAIL이면 옛/불안정한 상태의 모델로 캐시를 만들지 않도록)
      - name: precompute-dashboard
        template: precompute-dashboard
        dependencies: [smoke-test-api]
        when: "{{workflow.parameters.dry_run}} != true"

  # ---------------------------------------------------------------------------
  # 메인 단계: run_model_update_pipeline.py 실행
  # ---------------------------------------------------------------------------
  - name: run-pipeline
    inputs:
      parameters:
      - name: version
      - name: onnx_path
      - name: normalizer_path
      - name: metadata_path
      - name: dry_run

    # resolved-version: version 파라미터가 비어 있을 때 스크립트 내부에서
    # 날짜 기반으로 자동 생성한 실제 버전명. smoke-test-api가 "방금 승격한
    # 버전이 실제로 떠 있는지" 확인하려면 이 값이 필요하다 - 워크플로우
    # 파라미터(version)만으로는 빈 문자열일 수 있어 부족하다.
    outputs:
      parameters:
      - name: resolved-version
        valueFrom:
          path: /tmp/resolved_version.txt

    # script 템플릿: Python 코드로 CLI 인자를 조합한 뒤 파이프라인 호출
    # container 템플릿보다 조건부 인자(--dry-run) 처리가 용이함
    script:
      # TODO: 실제 이미지 이름/태그로 교체 필요
      # 이 이미지에는 ml-pipeline 코드, Python 의존성이 포함되어야 한다
      image: agami-captcha.cloud:8443/agami/agami-mlops:latest
      imagePullPolicy: IfNotPresent

      command: [python]

      # 컨테이너 내 작업 디렉토리
      # run_model_update_pipeline.py가 상대경로로 model-store, runs를 참조하는 기준점
      workingDir: /workspace/ml-pipeline

      source: |
        import subprocess
        import sys
        from datetime import datetime

        # version이 비어 있으면 날짜 기반 자동 생성
        version = "{{inputs.parameters.version}}"
        if not version:
            version = f"v_{datetime.now().strftime('%Y%m%d')}"

        # 이후 단계(restart-inference-api 다음의 smoke-test-api)가 "정확히 이
        # 버전이 떴는지"를 확인하려면 resolved-version 출력 파라미터가 필요하다.
        # promote가 실제로 끝나기 전에 미리 써두는 게 아니라, 어떤 버전을
        # 시도했는지를 기록하는 것 - 이 task 자체가 실패하면 Argo가 출력
        # 파라미터를 읽지 않고 dependents를 건너뛰므로 안전하다.
        with open("/tmp/resolved_version.txt", "w") as f:
            f.write(version)

        cmd = [
            "python", "-m", "flashlight.scripts.run_model_update_pipeline",
            "--version",    version,
            "--onnx",       "{{inputs.parameters.onnx_path}}",
            "--normalizer", "{{inputs.parameters.normalizer_path}}",
            "--metadata",   "{{inputs.parameters.metadata_path}}",
        ]

        # dry_run 파라미터가 "true" 일 때만 --dry-run 플래그 추가
        if "{{inputs.parameters.dry_run}}" == "true":
            cmd.append("--dry-run")

        print(f"[pipeline] 버전: {version}")
        print(f"[pipeline] 실행 명령: {' '.join(cmd)}")
        print()

        result = subprocess.run(cmd, cwd="/workspace/ml-pipeline")
        sys.exit(result.returncode)

      volumeMounts:
      # -----------------------------------------------------------------------
      # [필수] model-store 볼륨
      # 역할: candidates/, current/, archive/ 읽기/쓰기
      # PVC: flashlight-model-store-pvc (TODO: 실제 PVC 이름 확정 필요)
      # -----------------------------------------------------------------------
      - name: model-store
        mountPath: /workspace/ml-pipeline/model-store

      # -----------------------------------------------------------------------
      # [필수] data 볼륨
      # 역할:
      #   - data/flashlight/processed/  학습 데이터 읽기
      #   - runs/                       학습 산출물 읽기 (.onnx, .joblib, .json)
      # PVC: flashlight-data-pvc (TODO: 실제 PVC 이름 확정 필요)
      # -----------------------------------------------------------------------
      - name: data
        mountPath: /workspace/ml-pipeline/data

      # -----------------------------------------------------------------------
      # [선택] runs 볼륨 (data 볼륨과 별도 관리 시)
      # 역할: 학습 산출물(.onnx, .joblib, .json) 읽기 전용
      # PVC: flashlight-runs-pvc (TODO: 실제 PVC 이름 확정 필요)
      # 현재는 data 볼륨에 runs/가 포함되어 있으므로 주석 처리
      # -----------------------------------------------------------------------
      # - name: runs
      #   mountPath: /workspace/ml-pipeline/runs
      #   readOnly: true

      resources:
        requests:
          memory: "2Gi"
          cpu: "1"
        limits:
          memory: "4Gi"
          cpu: "2"
        # GPU가 필요한 경우 (학습 단계 포함 시 활성화)
        # limits:
        #   nvidia.com/gpu: "1"

    timeout: "2h"

    retryStrategy:
      limit: "2"
      retryPolicy: OnError

  # ---------------------------------------------------------------------------
  # 대시보드 캐시 재생성: precompute_dashboard.py 실행
  # 모델 업데이트 완료 후 dashboard_cache.json 을 model-store PVC 에 기록
  # ---------------------------------------------------------------------------
  - name: precompute-dashboard
    container:
      image: agami-captcha.cloud:8443/agami/flashlight-api:latest
      imagePullPolicy: IfNotPresent
      workingDir: /workspace/ml-pipeline
      command:
        - python
        - -m
        - flashlight.scripts.precompute_dashboard
        - --data-dir
        - /workspace/ml-pipeline/data/flashlight
        - --out
        - /workspace/ml-pipeline/model-store/flashlight/dashboard_cache.json
      env:
        - name: FLASHLIGHT_MODEL_DIR
          value: /workspace/ml-pipeline/model-store/flashlight/current
        - name: PYTHONUNBUFFERED
          value: "1"
      volumeMounts:
        - name: model-store
          mountPath: /workspace/ml-pipeline/model-store
        - name: data
          mountPath: /workspace/ml-pipeline/data
      resources:
        requests:
          memory: "1Gi"
          cpu: "500m"
        limits:
          memory: "2Gi"
          cpu: "1"
    timeout: "30m"
    retryStrategy:
      limit: "1"
      retryPolicy: OnError

  # ---------------------------------------------------------------------------
  # 운영 pod 재시작: promote_model.py가 model-store/flashlight/current/를
  # 바꿔도, 이미 떠 있는 API pod는 FastAPI lifespan에서 모델을 딱 한 번만
  # 로드하므로(api/loader.py) 재시작 전까지 옛 모델을 계속 서빙한다. 이
  # step이 없으면 "승격했지만 운영에는 반영 안 됨" 상태가 무기한 지속될 수
  # 있다.
  #
  # rollout status까지 기다려서, 새 pod가 전부 Ready가 되기 전에는 다음
  # 단계(smoke-test-api)로 넘어가지 않는다. restart/rollout 자체가 실패하면
  # (이미지 pull 실패, readinessProbe 실패 등) 이 step이 비0 종료코드로
  # 끝나고 워크플로우가 실패로 표시된다.
  # ---------------------------------------------------------------------------
  - name: restart-inference-api
    inputs:
      parameters:
      - name: namespace
      - name: deployment_name
      - name: rollout_timeout
    container:
      # kubectl만 있으면 되는 가벼운 이미지. 버전은 클러스터 kube-apiserver와
      # 호환되는 태그로 고정해서 사용할 것.
      image: bitnami/kubectl:1.28
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -euo pipefail
          echo "[restart] kubectl rollout restart deployment/{{inputs.parameters.deployment_name}} -n {{inputs.parameters.namespace}}"
          kubectl rollout restart deployment/{{inputs.parameters.deployment_name}} -n {{inputs.parameters.namespace}}

          echo "[restart] kubectl rollout status 대기 (timeout={{inputs.parameters.rollout_timeout}})"
          kubectl rollout status deployment/{{inputs.parameters.deployment_name}} \
            -n {{inputs.parameters.namespace}} \
            --timeout={{inputs.parameters.rollout_timeout}}

          echo "[restart] rollout 완료 - 새 pod 전부 Ready"
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "250m"
          memory: "128Mi"
    timeout: "10m"
    # rollout status 타임아웃/실패는 일시적 클러스터 이슈일 수 있으므로 1회 재시도.
    # 무한 재시도는 하지 않는다 - 반복 실패는 사람이 봐야 하는 문제다.
    retryStrategy:
      limit: "1"
      retryPolicy: OnError

  # ---------------------------------------------------------------------------
  # 운영 스모크 테스트: flashlight.scripts.smoke_test_model 실행
  #
  # rollout이 끝났다는 것(Ready)과 "방금 승격한 버전이 정확히 떠서 정상
  # 추론까지 되는 것"은 다른 이야기다 - /health의 model_version을 candidate
  # 버전과 직접 대조하고, 실제 /predict 호출까지 해본다. 실패하면 이 step이
  # 비0 종료코드를 반환해 워크플로우 전체가 실패로 끝난다 (precompute-dashboard도
  # dependencies 때문에 실행되지 않음).
  # ---------------------------------------------------------------------------
  - name: smoke-test-api
    inputs:
      parameters:
      - name: base_url
      - name: expected_version
      - name: retries
    container:
      image: agami-captcha.cloud:8443/agami/agami-mlops:latest
      imagePullPolicy: IfNotPresent
      workingDir: /workspace/ml-pipeline
      command:
        - python
        - -m
        - flashlight.scripts.smoke_test_model
        - --base-url
        - "{{inputs.parameters.base_url}}"
        - --expected-version
        - "{{inputs.parameters.expected_version}}"
        - --retries
        - "{{inputs.parameters.retries}}"
      env:
        - name: PYTHONUNBUFFERED
          value: "1"
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "250m"
          memory: "256Mi"
    timeout: "10m"

  # ---------------------------------------------------------------------------
  # 볼륨 정의
  # PVC 이름은 클러스터 환경에 맞게 수정할 것
  # ---------------------------------------------------------------------------
  volumes:
  # model-store PVC: ReadWriteOnce 또는 ReadWriteMany
  # promote 단계에서 current/를 직접 수정하므로 쓰기 권한 필요
  - name: model-store
    persistentVolumeClaim:
      claimName: flashlight-model-store-pvc   # TODO: 실제 PVC 이름으로 교체

  # data PVC: 학습 데이터 + runs 산출물
  # 학습 단계와 pipeline 단계가 같은 PVC를 공유할 경우 ReadWriteMany 필요
  - name: data
    persistentVolumeClaim:
      claimName: flashlight-data-pvc          # TODO: 실제 PVC 이름으로 교체

---
# -----------------------------------------------------------------------------
# [2] CronWorkflow — 매주 월요일 03:00 KST 자동 실행
#
# WorkflowTemplate을 참조하므로 파이프라인 로직을 중복 정의하지 않는다.
# 파라미터 기본값은 WorkflowTemplate에 정의된 값을 사용한다.
# -----------------------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: flashlight-model-update-cron
  namespace: argo
  labels:
    app: flashlight
    component: model-update-cron
spec:
  # 매주 월요일 오전 03:00 (UTC 18:00 일요일 = KST 03:00 월요일)
  schedules:
  - "0 18 * * 0"
  timezone: "UTC"
  # 동일 워크플로우가 이미 실행 중이면 새 실행을 건너뜀
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3

  workflowSpec:
    # WorkflowTemplate 참조 — 파이프라인 로직은 템플릿에서 관리
    workflowTemplateRef:
      name: flashlight-model-update

    arguments:
      parameters:
      # version을 비워두면 스크립트 내부에서 실행 날짜로 자동 생성
      - name: version
        value: ""
      # CronWorkflow는 기본적으로 실제 실행 (dry_run=false)
      - name: dry_run
        value: "false"
      # onnx_path, normalizer_path, metadata_path는 WorkflowTemplate 기본값 사용
      # 학습이 완료된 후 최신 run 경로로 오버라이드할 것
