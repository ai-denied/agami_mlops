# =============================================================================
# context-emotion-api — Deployment + Service
#
# 포트 8083 | FastAPI (uvicorn) | 감정 CAPTCHA 출제·채점 서빙 API
#
# 볼륨:
#   model-store PVC (ReadOnly)   → /model-store/context_emotion/current  (subPath)
#   data PVC (ReadOnly)          → /data/context_emotion  (이미지 정적 서빙)
#   attempt-logs PVC (ReadWrite) → /attempt-logs  (data와 별도 경로로 분리)
#
# 의존 PVC:
#   captcha-bank-model-store-pvc  (pvc-captcha-bank.yaml)
#   captcha-bank-data-pvc         (pvc-captcha-bank.yaml)
#   captcha-bank-attempt-logs-pvc (pvc.yaml)
# =============================================================================

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: context-emotion-api
  namespace: agami
  labels:
    app: context-emotion-api
    component: serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: context-emotion-api
  template:
    metadata:
      labels:
        app: context-emotion-api
        component: serving
    spec:
      imagePullSecrets:
      - name: harbor-regcred

      initContainers:
      - name: init-dirs
        image: busybox:1.36
        command: [sh, -c, "mkdir -p /model-store/captcha_bank/current"]
        volumeMounts:
        - name: model-store
          mountPath: /model-store

      containers:
      - name: captcha-api
        image: agami-captcha.cloud:8443/agami/agami-captcha-bank:863f7ba3
        imagePullPolicy: Always

        command:
        - uvicorn
        - context_emotion.serving.app:app
        - --host
        - "0.0.0.0"
        - --port
        - "8083"
        - --workers
        - "1"

        ports:
        - containerPort: 8083
          name: http

        env:
        - name: PYTHONPATH
          value: "/workspace/ml-pipeline"
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: CAPTCHA_POOL_DIR
          value: "/model-store/context_emotion/current"
        - name: ATTEMPT_LOG_DIR
          value: "/attempt-logs"
        - name: IMAGE_BASE_URL
          value: "/static/images"
        - name: IMAGE_BASE_DIR
          value: "/data/context_emotion"
        - name: POOL_RELOAD_INTERVAL_SEC
          value: "300"
        - name: CHALLENGE_TTL_SEC
          value: "300"
        - name: MAX_CHALLENGE_RETRIES
          value: "2"
        - name: MAX_CHALLENGES_PER_SESSION
          value: "10"

        volumeMounts:
        - name: model-store
          mountPath: /model-store/context_emotion/current
          subPath: captcha_bank/current
          readOnly: true
        - name: data
          mountPath: /data/context_emotion
          readOnly: true
        - name: attempt-logs
          mountPath: /attempt-logs

        livenessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"

      volumes:
      - name: model-store
        persistentVolumeClaim:
          claimName: captcha-bank-model-store-pvc
      - name: data
        persistentVolumeClaim:
          claimName: captcha-bank-data-pvc
      - name: attempt-logs
        persistentVolumeClaim:
          claimName: captcha-bank-attempt-logs-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: context-emotion-api
  namespace: agami
  labels:
    app: context-emotion-api
    component: serving
spec:
  type: ClusterIP
  selector:
    app: context-emotion-api
  ports:
  - name: http
    port: 8083
    targetPort: 8083
    protocol: TCP
