# =============================================================================
# precompute-job.yaml
#
# dashboard_cache.json 생성 Job
# flashlight 세션 데이터 전체를 ONNX 모델로 일괄 추론해 캐시 파일 생성.
#
# 실행:
#   kubectl apply -f manifests/dashboard-api/precompute-job.yaml -n agami
#
# 완료 확인:
#   kubectl get job dashboard-precompute -n agami
#   kubectl logs -l job-name=dashboard-precompute -n agami
#
# 재실행 시 기존 Job 삭제 후 재적용:
#   kubectl delete job dashboard-precompute -n agami
#   kubectl apply -f manifests/dashboard-api/precompute-job.yaml -n agami
# =============================================================================

apiVersion: batch/v1
kind: Job
metadata:
  name: dashboard-precompute
  namespace: agami
  labels:
    app: dashboard-api
    component: precompute
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 1

  template:
    metadata:
      labels:
        app: dashboard-api
        component: precompute

    spec:
      restartPolicy: Never

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: precompute
          image: agami-captcha.cloud:8443/agami/flashlight-api:9c2a6197
          imagePullPolicy: Always

          command:
            - python
            - -m
            - flashlight.scripts.precompute_dashboard
            - --data-dir
            - /workspace/ml-pipeline/data/flashlight
            - --out
            - /workspace/ml-pipeline/model-store/flashlight/dashboard_cache.json
            - --model-dir
            - /workspace/ml-pipeline/model-store/flashlight/current

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONPATH
              value: /workspace/ml-pipeline

          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          volumeMounts:
            - name: model-store
              mountPath: /workspace/ml-pipeline/model-store
            - name: data
              mountPath: /workspace/ml-pipeline/data
              readOnly: true

      volumes:
        - name: model-store
          persistentVolumeClaim:
            claimName: flashlight-model-store-pvc
        - name: data
          persistentVolumeClaim:
            claimName: flashlight-data-pvc
