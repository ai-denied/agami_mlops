
services:
  # 1. FastAPI 백엔드 서비스
  api:
    build: .
    container_name: captcha_api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - DATABASE_URL=postgresql+asyncpg://captcha_user:securepassword@db:5432/captcha_db
      - REDIS_URL=redis://redis:6379/0
      - API_KEY_HMAC_PEPPER=local-pepper-do-not-use-in-prod
      - CAPTCHA_TOKEN_SECRET=local-token-secret-do-not-use-in-prod
    volumes:
      - ./captcha_logs:/app/captcha_logs
    depends_on:
      - db
      - redis
    restart: always

  # 2. PostgreSQL 데이터베이스 서비스
  #    - /docker-entrypoint-initdb.d 안의 *.sql 은 첫 부팅(빈 볼륨) 시 자동 실행됨.
  #    - schema.sql → seed.sql 사전식 정렬 보장 위해 파일명 앞에 번호를 붙임.
  db:
    image: postgres:15-alpine
    container_name: captcha_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=captcha_user
      - POSTGRES_PASSWORD=securepassword
      - POSTGRES_DB=captcha_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./app/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    restart: always

  # 3. Redis 서비스 (Rate Limit / 챌린지 정답 캐시)
  redis:
    image: redis:7-alpine
    container_name: captcha_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
