# =============================================================================
# 운영(통합) compose — captcha_engine + captcha-frontend(widget) 단일 이미지
# -----------------------------------------------------------------------------
# 실행 (captcha_engine 디렉토리에서):
#   docker compose -f docker-compose.prod.yml up -d --build
#
# build context 가 상위 (AI_captcha_project/) 로 잡혀 있어 Dockerfile.prod 안에서
# captcha-frontend/ 와 captcha_engine/ 두 디렉토리를 모두 COPY 할 수 있다.
#
# 운영용 시크릿 값은 반드시 host 의 .env 또는 외부 KMS 에서 주입할 것.
# 아래 환경변수는 KakaoCloud K8s/VM 에서 동작하는 최소 셋. 실 시크릿 값은 절대
# 이 파일에 직접 적지 말 것 (compose 파일이 git 추적될 수 있음).
# =============================================================================

services:
  api:
    build:
      context: ../
      dockerfile: captcha_engine/Dockerfile.prod
    container_name: captcha_api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://captcha_user:securepassword@db:5432/captcha_db}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - API_KEY_HMAC_PEPPER=${API_KEY_HMAC_PEPPER:?must be set}
      - CAPTCHA_TOKEN_SECRET=${CAPTCHA_TOKEN_SECRET:?must be set}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15-alpine
    container_name: captcha_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-captcha_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?must be set}
      - POSTGRES_DB=${POSTGRES_DB:-captcha_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./app/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    restart: always

  redis:
    image: redis:7-alpine
    container_name: captcha_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
