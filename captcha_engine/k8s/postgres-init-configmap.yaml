# =============================================================================
# postgres-init — placeholder. 운영에서는 다음 명령으로 직접 생성하는 것을 권장:
#
#   kubectl create configmap postgres-init \
#     --from-file=01-schema.sql=app/db/schema.sql \
#     --from-file=02-seed.sql=app/db/seed.sql
#
# 이 파일은 ConfigMap 의 구조와 mount 규약(/docker-entrypoint-initdb.d/<NN>-*.sql 정렬)
# 을 문서화하는 용도. data 가 비어있으므로 그대로 apply 해도 무해하나 init 효과는 없음.
#
# 첫 부팅(빈 PVC) 에서만 init 스크립트가 실행됨에 주의 (Postgres 공식 docker-entrypoint
# 동작). 이미 데이터가 있는 PVC 에는 적용 안 됨 → docs/DEPLOY_K3S.md 6단계의 강제
# 적용 명령 참고.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
data: {}
