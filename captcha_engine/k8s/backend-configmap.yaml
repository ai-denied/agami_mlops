apiVersion: v1
kind: ConfigMap
metadata:
  name: captcha-api-config
data:
  # ----- HTTP/CORS -----
  # 콤마 구분. HTTPS 전환 시 https:// origin 도 함께 추가 (docs/HTTPS_MIGRATION.md).
  CORS_ORIGINS: "http://210.109.53.140,http://localhost:5173"

  # ----- 인프라 연결 -----
  # postgres 서비스 이름은 K3s 기본 cluster.local DNS 로 해소.
  # 비밀번호 'captcha' 는 MVP 기본값. 실제 변경 시 postgres-secret 의
  # POSTGRES_PASSWORD 와 함께 동기화 필요 (혹은 DATABASE_URL 자체를 secret 으로 이전).
  DATABASE_URL: "postgresql+asyncpg://captcha:captcha@postgres:5432/captcha"
  REDIS_URL: "redis://redis:6379/0"

  # ----- 캡챠 정책 -----
  DEFAULT_DIFFICULTY: "medium"
  DEFAULT_RATE_LIMIT_PER_MIN: "60"
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
