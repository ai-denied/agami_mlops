# =============================================================================
# captcha-api-secrets — 예시 매니페스트 (이 파일은 절대 그대로 적용하지 말 것)
# -----------------------------------------------------------------------------
# 운영 시에는 아래 명령으로 임의 값으로 직접 생성:
#
#   kubectl create secret generic captcha-api-secrets \
#     --from-literal=API_KEY_HMAC_PEPPER=$(openssl rand -hex 32) \
#     --from-literal=CAPTCHA_TOKEN_SECRET=$(openssl rand -hex 32)
#
# 회전(rotate) 절차:
#   1) 새 값으로 secret 재생성: kubectl create secret generic ... --dry-run=client -o yaml \
#        | kubectl apply -f -
#   2) Pod 재시작:               kubectl rollout restart deployment/captcha-api
#   3) 회전 시 발급되어 있던 captcha_token 들은 무효화됨 — 사용자 영향 인지 필요.
#
# Postgres 비밀번호 secret (별도) 도 마찬가지 패턴:
#
#   kubectl create secret generic postgres-secret \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -hex 16)
#
#   주의: 비밀번호를 변경하면 backend-configmap.yaml 의 DATABASE_URL 도 함께 갱신해야 함.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  # 절대 이 값을 운영에 그대로 사용하지 말 것 — 위 openssl 명령으로 재생성.
  API_KEY_HMAC_PEPPER: 8370a460cae6e2c99812321e74837dba095b4acb99c0c2b9381171fe6d080852
  CAPTCHA_TOKEN_SECRET: a73236e9b0ce5961543989e2af37a78db4b953a9b7ed13721648dfbaa706a294
  POSTGRES_PASSWORD: uyH9MvUEQ4DEFcmsXsn6DmAQKVwNyw5a