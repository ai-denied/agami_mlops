<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>agami captcha — embed test</title>
    <style>
      :root { font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
      body { margin: 0; padding: 24px; background: #f5f8ff; color: #1d2a44; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p.lead { margin: 0 0 16px; color: #6b7891; font-size: 14px; }
      .row { display: flex; gap: 24px; align-items: flex-start; }
      .frame-wrap { flex: 1 1 700px; border: 2px solid #c8dcff; border-radius: 16px; overflow: hidden; background: #fff; }
      iframe { display: block; width: 100%; height: 720px; border: 0; }
      .log {
        flex: 0 0 360px; max-height: 720px; overflow: auto;
        background: #0a0a14; color: #d6e0ff;
        border-radius: 12px; padding: 16px;
        font: 13px/1.5 ui-monospace, SFMono-Regular, monospace;
      }
      .log h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em; color: #4a8bff; margin: 0 0 12px; }
      .row-entry { border-bottom: 1px solid rgba(255,255,255,0.08); padding: 8px 0; }
      .row-entry.success { color: #4ade80; }
      .row-entry.fail { color: #fb7185; }
      .ts { color: #6b7891; font-size: 11px; }
      pre { margin: 4px 0 0; white-space: pre-wrap; word-break: break-all; }
      .controls { margin-bottom: 16px; display: flex; gap: 8px; }
      button {
        padding: 8px 14px; border-radius: 8px; border: 1px solid #c8dcff;
        background: #fff; color: #2563eb; font-weight: 600; cursor: pointer;
      }
      button:hover { background: #eef4ff; }
      .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eef4ff; color: #2563eb; font-size: 11px; font-weight: 600; margin-right: 6px; }
    </style>
  </head>
  <body>
    <h1>agami captcha — embed test</h1>
    <p class="lead">
      iframe 으로 <code>/widget/embed</code> 를 로드하고 부모에서 postMessage 를 받습니다.
      kind / difficulty 를 바꿔서 다른 캡챠를 띄울 수 있습니다.
    </p>

    <div class="controls">
      <button onclick="reload('flashlight','easy')">flashlight · easy</button>
      <button onclick="reload('flashlight','medium')">flashlight · medium</button>
      <button onclick="reload('flashlight','hard')">flashlight · hard</button>
      <button onclick="reload('face_mission','easy')">face_mission · easy</button>
      <button onclick="reload('context_inference','easy')">context_inference · easy</button>
    </div>

    <div class="row">
      <div class="frame-wrap">
        <iframe id="captcha-frame" src="http://localhost:8000/widget/embed?kind=flashlight&difficulty=easy"
                allow="camera; microphone" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
      <div class="log">
        <h2>postMessage 수신 로그</h2>
        <div id="log-body">
          <div class="row-entry"><span class="ts">대기 중…</span></div>
        </div>
      </div>
    </div>

    <script>
      function reload(kind, difficulty) {
        const f = document.getElementById('captcha-frame');
        f.src = `http://localhost:8000/widget/embed?kind=${encodeURIComponent(kind)}&difficulty=${encodeURIComponent(difficulty)}`;
        appendLog({ type: 'reload', kind, difficulty }, 'info');
      }

      function appendLog(data, cls) {
        const body = document.getElementById('log-body');
        const entry = document.createElement('div');
        entry.className = 'row-entry ' + (cls || '');
        const ts = new Date().toLocaleTimeString();
        entry.innerHTML = `<div><span class="ts">${ts}</span></div><pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
        body.prepend(entry);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
          '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
        }[c]));
      }

      window.addEventListener('message', (e) => {
        // 다양한 origin 을 받을 수 있으므로 type 만 검사.
        if (e.data && e.data.type === 'agami-result') {
          const cls = e.data.success ? 'success' : 'fail';
          appendLog(e.data, cls);
          // 부모 앱에서 e.data.captchaToken 을 /v1/siteverify 로 전달하면 됨.
          if (e.data.success && e.data.captchaToken) {
            console.log('captchaToken =', e.data.captchaToken);
          }
        }
      });
    </script>
  </body>
</html>
